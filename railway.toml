[build]
builder = "RAILPACK"
buildCommand = "npm run build"

[deploy]
# Use npx directly to avoid extra shell nesting that can confuse Railway's process manager
startCommand = "npx next start"
restartPolicyType = "ON_FAILURE"
# Remove max retries so Railway keeps trying instead of giving up after 3 crashes
healthcheckPath = "/api/health"
# Next.js 14 can take 60-120s to fully boot on Railway's builders.
# Give it 180s before Railway considers the deployment unhealthy.
healthcheckTimeout = 180
